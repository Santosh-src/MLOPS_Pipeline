name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Pipeline action"
        required: false
        default: "deploy"
        type: choice
        options: ["deploy", "undeploy"]
      skip_cd:
        description: "Skip CD job (deploy action only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      push_to_registry:
        description: "Push image to ghcr.io"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/heart-disease-api

jobs:
  ci:
    name: CI - Lint, Test & Train
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'undeploy'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check src/ tests/ dataprocessing/ --output-format=github

      - name: Download raw data
        run: python dataprocessing/download_data.py

      - name: Process data
        run: python dataprocessing/process_data.py

      - name: Data tests
        run: python -m pytest tests/test_data.py -v --tb=short --junitxml=test-results-data.xml

      - name: Train models
        run: python -m src.training.train

      - name: Model tests
        run: python -m pytest tests/test_model.py -v --tb=short --junitxml=test-results-model.xml

      - name: Upload test results
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results-*.xml

      - name: Upload trained model
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            model/heart_disease_model.joblib
            model/metrics.json

      - name: Upload MLflow runs
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/

  cd:
    name: CD - Build & Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: |
      github.event.inputs.action != 'undeploy' &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.skip_cd == 'true')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download trained model (remote)
        if: env.ACT != 'true'
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: model/

      - name: Verify trained model present (act)
        if: env.ACT == 'true'
        run: test -f model/heart_disease_model.joblib

      - name: Build Docker image
        run: docker build -t heart-disease-api:latest .

      - name: Container smoke test
        run: |
          docker run -d --name test-api -p 8080:8080 heart-disease-api:latest
          sleep 10
          curl -sf http://localhost:8080/health | python3 -m json.tool
          curl -sf -X POST http://localhost:8080/predict \
            -H "Content-Type: application/json" \
            -d '{"age":63,"sex":1,"cp":3,"trestbps":145,"chol":233,"fbs":1,"restecg":0,"thalach":150,"exang":0,"oldpeak":2.3,"slope":0,"ca":0,"thal":6}' \
            | python3 -m json.tool
          docker rm -f test-api

      - name: Log in to ghcr.io
        if: env.ACT != 'true' && github.event.inputs.push_to_registry == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        if: env.ACT != 'true' && github.event.inputs.push_to_registry == 'true'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker tag heart-disease-api:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag heart-disease-api:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}

      - name: Ensure kubectl (act)
        if: env.ACT == 'true'
        run: |
          if command -v kubectl &>/dev/null; then
            echo "kubectl available (mounted): $(kubectl version --client 2>/dev/null | head -1)"
            exit 0
          fi
          echo "kubectl not mounted; downloading inside container..."
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)        K8S_ARCH="amd64" ;;
            aarch64|arm64) K8S_ARCH="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          K8S_VER=$(curl --connect-timeout 10 --max-time 30 -sL https://dl.k8s.io/release/stable.txt) \
            || { echo "::error::Cannot reach dl.k8s.io"; exit 1; }
          curl --connect-timeout 10 --max-time 300 -fL \
            "https://dl.k8s.io/release/$K8S_VER/bin/linux/$K8S_ARCH/kubectl" \
            -o /usr/local/bin/kubectl
          chmod +x /usr/local/bin/kubectl
          echo "kubectl installed: $(kubectl version --client 2>/dev/null | head -1)"

      - name: Deploy to local Kubernetes (act)
        if: env.ACT == 'true'
        run: |
          if [[ ! -f /root/.kube/config ]]; then
            echo "::warning::kubeconfig not mounted into the act container; skipping deploy."
            echo "To deploy to your local cluster, re-run via the wrapper:"
            echo "  ./scripts/act-local.sh push"
            exit 0
          fi
          export KUBECONFIG=$(./scripts/act-kubeconfig.sh)
          ./scripts/deploy.sh

      - name: Remote summary
        if: env.ACT != 'true'
        run: |
          echo "Image built and tested. To deploy to your local cluster, run:"
          echo "  ./scripts/deploy.sh              (direct)"
          echo "  ./scripts/act-local.sh push      (via act, with kubeconfig mounted)"

  undeploy:
    name: Undeploy from local Kubernetes
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'undeploy'

    steps:
      - uses: actions/checkout@v4

      - name: Remote runner notice
        if: env.ACT != 'true'
        run: |
          echo "Undeploy targets your local Docker Desktop K8s -- not the GitHub runner."
          echo "Run locally: act workflow_dispatch -j undeploy --input action=undeploy"
          echo "Or directly: ./scripts/undeploy.sh"

      - name: Ensure kubectl (act)
        if: env.ACT == 'true'
        run: |
          if command -v kubectl &>/dev/null; then
            echo "kubectl available (mounted): $(kubectl version --client 2>/dev/null | head -1)"
            exit 0
          fi
          echo "kubectl not mounted; downloading inside container..."
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)        K8S_ARCH="amd64" ;;
            aarch64|arm64) K8S_ARCH="arm64" ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          K8S_VER=$(curl --connect-timeout 10 --max-time 30 -sL https://dl.k8s.io/release/stable.txt) \
            || { echo "::error::Cannot reach dl.k8s.io"; exit 1; }
          curl --connect-timeout 10 --max-time 300 -fL \
            "https://dl.k8s.io/release/$K8S_VER/bin/linux/$K8S_ARCH/kubectl" \
            -o /usr/local/bin/kubectl
          chmod +x /usr/local/bin/kubectl
          echo "kubectl installed: $(kubectl version --client 2>/dev/null | head -1)"

      - name: Undeploy from local Kubernetes (act)
        if: env.ACT == 'true'
        run: |
          if [[ ! -f /root/.kube/config ]]; then
            echo "::warning::kubeconfig not mounted into the act container; skipping undeploy."
            echo "To undeploy from your local cluster, re-run via the wrapper:"
            echo "  ./scripts/act-local.sh workflow_dispatch -j undeploy --input action=undeploy"
            exit 0
          fi
          export KUBECONFIG=$(./scripts/act-kubeconfig.sh)
          ./scripts/undeploy.sh
